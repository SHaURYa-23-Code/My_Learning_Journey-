<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Semantic Table Layout</title>
</head>
<body>

    <table border="1" width="100%">
        
        <caption>Web Development Batch Tracker</caption>

        <colgroup>
            <col span="1" >
            <col span="1" >
        </colgroup>

        <thead>
            <tr>
                <th>Student Name</th>
                <th>Current Topic</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Ravi</td>
                <td>HTML Basics</td>
            </tr>
            <tr>
                <td>Priya</td>
                <td>Advanced CSS Grid</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <em>Students practice regularly to become industry-ready engineers.</em>
                </td>
            </tr>
        </tfoot>

    </table>

</body>
</html>
