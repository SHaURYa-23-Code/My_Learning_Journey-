<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Controls Registration Example</title>
</head>
<body>

    <h2>User Profiles Enrollment</h2>

    <form action="submit_handler.php" method="POST">
        <br><br>

        <label for="f_name">First Name:</label>
        <input 
            type="text" 
            id="f_name" 
            name="firstname" 
            placeholder="Enter the First Name"
        >
        <br><br>

        <label for="l_name">Last Name:</label>
        <input 
            type="text" 
            id="l_name" 
            name="lastname" 
            placeholder="Enter the Last Name"
        >
        <br><br>

        <input type="reset" value="Cancel">
        
        <input type="submit" value="Submit">
    </form>

</body>
</html>
