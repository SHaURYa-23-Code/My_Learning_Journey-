<body>

    <h2>Contact Us Form</h2>
    <p>If you have any inquiries, complaints, or need support, please fill out the form below.</p>

    <form action="#">
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="eg. priya@example.com" required><br><br>

        <label for="mobile">Mobile Number:</label><br>
        <input type="tel" id="mobile" name="mobile"><br><br>

        <label for="message">Your Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="30" placeholder="Write your inquiry or complaint here..."></textarea><br><br>

        <button type="submit">Send Message</button>
        <button type="reset">Clear Form</button>
    </form>
