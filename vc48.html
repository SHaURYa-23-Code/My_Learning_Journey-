<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid justify-content Tutorial - Session 9</title>
    <link rel="stylesheet" href="48.css">
</head>
<body>

    <h1>CSS Grid Horizontal Track Alignment (justify-content) Playground</h1>

    <h2>1. justify-content: start</h2>
    <div class="main-grid-container grid-cols-fixed grid-justify-start">
        <div class="grid-cell-item">1</div>
        <div class="grid-cell-item">2</div>
        <div class="grid-cell-item">3</div>
    </div>

    <h2>2. justify-content: center</h2>
    <div class="main-grid-container grid-cols-fixed grid-justify-center">
        <div class="grid-cell-item">1</div>
        <div class="grid-cell-item">2</div>
        <div class="grid-cell-item">3</div>
    </div>

    <h2>3. justify-content: end</h2>
    <div class="main-grid-container grid-cols-fixed grid-justify-end">
        <div class="grid-cell-item">1</div>
        <div class="grid-cell-item">2</div>
        <div class="grid-cell-item">3</div>
    </div>

    <h2>4. justify-content: space-around</h2>
    <div class="main-grid-container grid-cols-fixed grid-justify-space-around">
        <div class="grid-cell-item">1</div>
        <div class="grid-cell-item">2</div>
        <div class="grid-cell-item">3</div>
    </div>

    <h2>5. justify-content: space-between</h2>
    <div class="main-grid-container grid-cols-fixed grid-justify-space-between">
        <div class="grid-cell-item">1</div>
        <div class="grid-cell-item">2</div>
        <div class="grid-cell-item">3</div>
    </div>

    <h2>6. justify-content: space-evenly</h2>
    <div class="main-grid-container grid-cols-fixed grid-justify-space-evenly">
        <div class="grid-cell-item">1</div>
        <div class="grid-cell-item">2</div>
        <div class="grid-cell-item">3</div>
    </div>

</body>
</html>
