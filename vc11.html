<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>General-sibling Selector Demo</title>
	<link rel="stylesheet" href="11.css">
</head>
<body>
	<div>
		<p>This will NOT be red (It appears BEFORE the h2).</p>

		<h2>Main Heading</h2>

		<p>This WILL be red (Sibling appearing after h2).</p>
		<span>Some other text</span>
		<p>This WILL ALSO be red (It is still a sibling appearing after h2).</p>
	</div>
</body>
</html>
