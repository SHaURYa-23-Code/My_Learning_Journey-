<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid place-content Tutorial - Session 11</title>
    <link rel="stylesheet" href="50.css">
</head>
<body>

    <h1>How Place Content Works in CSS Grid</h1>

    <h2>1. Class: grid-place-start-center (Vertically Top / Horizontally Center)</h2>
    <div class="grid-container grid-cols-fixed grid-place-start-center">
        <div class="grid-box">1</div>
        <div class="grid-box">2</div>
        <div class="grid-box">3</div>
    </div>

    <h2>2. Class: center-center (Vertically Center / Horizontally Center)</h2>
    <div class="grid-container grid-cols-fixed center-center">
        <div class="grid-box">1</div>
        <div class="grid-box">2</div>
        <div class="grid-box">3</div>
    </div>

    <h2>3. Class: end-end (Vertically Bottom / Horizontally Right)</h2>
    <div class="grid-container grid-cols-fixed end-end">
        <div class="grid-box">1</div>
        <div class="grid-box">2</div>
        <div class="grid-box">3</div>
    </div>

</body>
</html>
