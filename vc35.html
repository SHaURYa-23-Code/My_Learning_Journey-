<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Demo</title>
    <link rel="stylesheet" href="35.css">
</head>
<body>

    <main>
        <div class="position-container">
            <h2>Absolute Positioning</h2>
            <p>Elements below use absolute positioning, which takes them out of the normal document flow...</p>

            <div class="box absolute-box1">
                Box 1<br>
                <small>(top: 10px; left: 10px;)</small>
            </div>

            <div class="box absolute-box2">
                Box 2<br>
                <small>(bottom: 10px; right: 10px;)</small>
            </div>

            <div class="box absolute-box3">
                Box 3<br>
                <small>(top: 50px; right: 50px;)</small>
            </div>
        </div>
    </main>

</body>
</html>
