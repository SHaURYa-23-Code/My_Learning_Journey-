<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Pseudo-Elements Part 2</title>
  <link rel="stylesheet" href="22.css">
</head>
<body>

  <div class="card">
    <details class="syllabus-accordion">
      <summary>Show Syllabus</summary>
      <div class="details-body">
        <p>Introduction to Web Development</p>
        <p>HTML5 & CSS3 Architecture</p>
        <p>Modern JavaScript (ES6+)</p>
      </div>
    </details>
  </div>

  <div class="card">
    <label for="user-resume" class="form-label">Upload your Resume:</label>
    <input type="file" id="user-resume" class="custom-file-input">
  </div>

  <div class="card">
    <label class="form-label">Contact Form:</label>
    <input type="text" class="styled-input" placeholder="Your Name">
    <input type="email" class="styled-input" placeholder="Your Email">
  </div>

</body>
</html>
