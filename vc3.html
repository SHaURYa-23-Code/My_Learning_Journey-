<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>External CSS Example</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="container">
			<h1>External CSS Demo</h1>
			<p>External CSS uses a separate <code>.css</code> file for styles. Link it from the document head with <code>&lt;link rel="stylesheet" href="style.css"&gt;</code> so multiple pages can share the same styles.</p>

			<div class="btn">
				<a href="#">Primary</a>
				<a href="#">Secondary</a>
			</div>
		</main>
	</body>
</html>
