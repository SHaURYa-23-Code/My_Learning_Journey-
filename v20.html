<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multimedia Engineering Example</title>
</head>
<body>

    <main>
        <h2>Multimedia Engineering Example</h2>

        <section id="image-demo">
            <h3>Corporate Branding Grid</h3>
            <img src="./images/chipi-logo.png" alt="Official Chipi Training Banner Logo" />
        </section>

        <section id="audio-demo">
            <h3>Classroom Technical Audio Logs</h3>
            <audio controls>
                <source src="./audio/data-structures-intro.mp3" type="audio/mpeg">
                Your legacy browser platform does not safely process standard HTML5 streaming audio nodes.
            </audio>
        </section>

        <section id="video-demo">
            <h3>Interactive Video Lab Tutorials</h3>
            <video width="600" controls>
                <source src="./video/html-deep-dive.mp4" type="video/mp4">
                Your browser structure lacks technical fallback playback drivers for embedded video elements.
            </video>
        </section>
    </main>

</body>
</html>
