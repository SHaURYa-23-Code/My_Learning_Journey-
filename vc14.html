<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Pseudo-Class & Pseudo-Element Demo</title>
  <link rel="stylesheet" href="14.css">
</head>
<body>

  <h1>CSS States & Parts Live Demo</h1>
  <hr>

  <section class="demo-section">
    <h2>1. Pseudo-Elements</h2>
    <article class="blog-post">
      <p>A pseudo-element is used to style a specific part of an element rather than its state (e.g., styling just the first letter of a paragraph or injecting decorative content)</p>
    </article>
  </section>

  <hr>

  <section class="demo-section">
    <h2>2. Pseudo-Classes</h2>
    <form class="interactive-form" onsubmit="event.preventDefault();">
      
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Type here...">
      </div>

      <div class="form-group">
        <label for="disabled-input">Account ID:</label>
        <input type="text" id="disabled-input" value="ACC-XXXXXX" disabled>
      </div>

      <button type="submit" class="btn-submit">Hover & Click Me</button>
    </form>
  </section>

</body>
</html>
