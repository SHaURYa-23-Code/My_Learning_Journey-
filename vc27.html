<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transparency vs Opacity</title>
  <link rel="stylesheet" href="27.css">
</head>
<body>

  <div class="box-section">
    <div class="box opacity-box">
      <h3>Using opacity: 0.5</h3>
      <p>This box, its content, and the button are <b>semi-transparent</b>.</p>
      <button class="btn">Button Inside</button>
    </div>

    <div class="box rgba-box">
      <h3>Using background-color: rgba()</h3>
      <p>This box has a <b>transparent background</b>, but solid text.</p>
      <button class="btn">Button Inside</button>
    </div>
  </div>

</body>
</html>
