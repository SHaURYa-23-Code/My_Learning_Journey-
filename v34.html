<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Color Picker Form Element</title>
</head>
<body>

    <form>
        <h3>Custom Application Theme Selector</h3>
        
        <label for="fav_color">Select Your Favorite Color:</label>
        
        <input 
            type="color" 
            id="fav_color" 
            name="favorite_color" 
            value="#FF0000"
        >
    </form>

</body>
</html>
