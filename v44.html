    <h2>Interactive Slider Controls</h2>

    <form action="#">
        <label for="range1">1. Default Slider (0 to 100):</label><br>
        <input type="range" id="range1" name="range1"><br><br>

        <label for="range2">2. Custom Range (Min 10 to Max 50):</label><br>
        <input type="range" id="range2" name="range2" min="10" max="50"><br><br>

        <label for="range3">3. Pre-set Value (Starts at 50):</label><br>
        <input type="range" id="range3" name="range3" min="0" max="100" value="50"><br><br>

        <label for="range4">4. Step Slider (Increments by 10):</label><br>
        <input type="range" id="range4" name="range4" min="0" max="100" step="10"><br><br>

        <label for="range5">5. Read-Only Slider (Value locked at 60):</label><br>
        <input type="range" id="range5" name="range5" min="0" max="100" value="60" readonly><br><br>

        <label for="range6">6. Disabled Slider:</label><br>
        <input type="range" id="range6" name="range6" min="0" max="100" value="20" disabled><br><br>

        <button type="submit">Submit Form</button>
    </form>
    

</body>
</html>
